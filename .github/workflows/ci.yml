name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint, type-check, prisma validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env for Prisma validation
        run: cp .env.example .env

      - name: Generate Prisma client
        run: pnpm --filter @refnet/api exec prisma generate

      - name: Prisma validate
        run: pnpm --filter @refnet/api prisma:validate

      - name: Type-check
        run: pnpm turbo run type-check

      - name: Lint
        run: pnpm turbo run lint

      - name: Prettier check
        run: pnpm format:check
