# Render Blueprint: Express API.
# Web (Next.js) is hosted on Netlify — see netlify.toml.
# Database is Supabase (managed outside Render).
#
# Deploy:
#   1. Push repo to GitHub (already done).
#   2. On Render → New → Blueprint → point at this repo.
#   3. In the Render dashboard, set DATABASE_URL and DIRECT_DATABASE_URL to the
#      Supabase connection strings (both are sync:false so the blueprint never
#      overwrites them). Use the Supabase pooler host, NOT a Render Postgres.
#   4. Set FRONTEND_URL to the app + marketing domains.

services:
  - type: web
    name: refnet-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: |
      corepack enable
      pnpm install --no-frozen-lockfile
      pnpm --filter @refnet/api exec prisma generate
      pnpm --filter @refnet/api exec prisma migrate deploy || echo "migrate skipped (see logs); runtime schema-ensure will cover new tables"
      pnpm --filter @refnet/api exec prisma db seed || echo "seed skipped"
    startCommand: pnpm --filter @refnet/api start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_NAME
        value: Referral Nova
      # Supabase connection strings — set these in the Render dashboard.
      # sync:false keeps a blueprint re-sync from overwriting them (that revert
      # is what pointed the app at an empty Render Postgres and 500'd all auth).
      # DATABASE_URL is used for runtime queries, DIRECT_DATABASE_URL for
      # migrations — both must point at Supabase.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      # Comma-separated allowed origins (CORS). MUST include the app domain, or
      # the browser blocks API calls from it.
      - key: FRONTEND_URL
        value: https://dashboard.referralnova.com,https://referralnova.com,https://referral-network-usa.netlify.app,http://localhost:3000
      - key: API_URL
        sync: false
      # Dashboard-managed: a Blueprint sync must NEVER regenerate these — doing
      # so invalidates every access + refresh token and logs the whole userbase
      # out mid-session.
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # 7 days: the session must not depend on a refresh round-trip mid-use —
      # a failed refresh (cold start, blip) was bouncing users to the login
      # page in the middle of actions. Refresh still rotates tokens on login
      # and before expiry.
      - key: JWT_ACCESS_TTL
        value: 7d
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: EMAIL_FROM
        value: noreply@referralnova.com
      # Unused on free deploy — keep schema happy.
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: ELASTICSEARCH_URL
        value: http://localhost:9200
      - key: AI_SERVICE_URL
        sync: false
      - key: AI_SERVICE_SECRET
        sync: false
