# Render Blueprint: Express API + Managed Postgres.
# Web (Next.js) is hosted on Netlify — see netlify.toml.
#
# Deploy:
#   1. Push repo to GitHub (already done).
#   2. On Render → New → Blueprint → point at this repo.
#   3. Render creates the DB + web service from this file.
#   4. After first deploy, set FRONTEND_URL to the Netlify domain.

databases:
  - name: refnet-db
    plan: free
    databaseName: referral_network
    user: refnet
    postgresMajorVersion: "15"

services:
  - type: web
    name: refnet-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: |
      corepack enable
      pnpm install --no-frozen-lockfile
      pnpm --filter @refnet/api exec prisma generate
      pnpm --filter @refnet/api exec prisma migrate deploy
      pnpm --filter @refnet/api exec prisma db seed || echo "seed skipped"
    startCommand: pnpm --filter @refnet/api start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_NAME
        value: ReferralNetworkUSA
      - key: DATABASE_URL
        fromDatabase:
          name: refnet-db
          property: connectionString
      # Comma-separated. Update with your Netlify domain after first deploy.
      - key: FRONTEND_URL
        value: https://referral-network-usa.netlify.app,http://localhost:3000
      - key: API_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: EMAIL_FROM
        value: noreply@referralnetworkusa.com
      # Unused on free deploy — keep schema happy.
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: ELASTICSEARCH_URL
        value: http://localhost:9200
