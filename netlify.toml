# Netlify config — NO-BUILD mode.
#
# The static site is pre-built to apps/web/out/ and committed directly to the
# repo. Netlify's job is literally just to serve those static files. No pnpm,
# no node, no build step — nothing that can fail.

[build]
  base = "."
  command = "echo 'Serving pre-built static export from apps/web/out/'"
  publish = "apps/web/out"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# SPA-style fallback: any unknown path falls back to the root index so the
# Next.js client router can handle it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
