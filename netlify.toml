# Netlify config for the Next.js frontend in a pnpm monorepo.
# The Next.js runtime plugin is auto-installed by Netlify when it detects Next.
#
# DEFAULT BEHAVIOR: ships in DEMO MODE — the frontend serves realistic mock
# data from `apps/web/lib/mockData.ts`. No backend required for client demos.
#
# To switch to a live backend, add this env var in the Netlify UI:
#   NEXT_PUBLIC_API_URL = https://<your-render-api>.onrender.com
# and redeploy.

[build]
  base = "."
  command = "corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter @refnet/web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # Force demo mode by default. Override in Netlify UI to point at a real API.
  NEXT_PUBLIC_DEMO_MODE = "force"
  NEXT_PUBLIC_APP_NAME = "ReferralNetworkUSA"
