# Netlify config — builds Next.js static export on every deploy.

[build]
  base = "."
  command = "corepack enable && pnpm install --no-frozen-lockfile && NEXT_PUBLIC_API_URL=https://api.virtualprosnetwork.com NEXT_PUBLIC_APP_NAME=ReferralNova pnpm --filter @refnet/web build"
  publish = "apps/web/out"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://api.virtualprosnetwork.com"
  NEXT_PUBLIC_APP_NAME = "ReferralNova"

# Dynamic route fallbacks
[[redirects]]
  from = "/listing/*"
  to = "/listing/listing/index.html"
  status = 200

[[redirects]]
  from = "/connect/*"
  to = "/connect/buying-a-home/index.html"
  status = 200

# SPA-style fallback for everything else
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
