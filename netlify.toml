# Netlify config — NO-BUILD mode.
#
# The static site is pre-built to apps/web/out/ and committed directly to the
# repo. Netlify's job is literally just to serve those static files. No pnpm,
# no node, no build step — nothing that can fail.

[build]
  base = "."
  command = "echo 'Serving pre-built static export from apps/web/out/'"
  publish = "apps/web/out"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Dynamic route fallbacks — serve a pre-rendered template page so the
# client-side component can read the real slug from the URL and fetch data.
[[redirects]]
  from = "/listing/*"
  to = "/listing/johnson-realty-group/index.html"
  status = 200

[[redirects]]
  from = "/connect/*"
  to = "/connect/buying-a-home/index.html"
  status = 200

# SPA-style fallback for everything else
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
