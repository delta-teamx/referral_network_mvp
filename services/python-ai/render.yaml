services:
  - type: web
    name: vpn-ai
    runtime: python
    plan: free
    region: oregon
    rootDir: services/python-ai
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: cd src && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AI_SERVICE_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
